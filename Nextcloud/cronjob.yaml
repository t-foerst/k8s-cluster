apiVersion: batch/v1
kind: CronJob
metadata:
  name: nextcloud-cron
  namespace: nextcloud
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: nextcloud-cron
              image: docker.io/nextcloud:latest
              imagePullPolicy: IfNotPresent
              command:
                - php
                - -f
                - /var/www/html/cron.php
              env:
                - name: POSTGRES_HOST
                  value: nextcloud-db
                - name: POSTGRES_DB
                  value: nextcloud
                - name: POSTGRES_USER
                  value: nextcloud
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: nextcloud-secret
                      key: postgresql-password
              volumeMounts:
                - name: nextcloud-html
                  mountPath: /var/www/html
                - name: nextcloud-data
                  mountPath: /var/www/html/data
              resources:
                requests:
                  cpu: 10m
                  memory: 128Mi
                limits:
                  memory: 256Mi
          volumes:
            - name: nextcloud-html
              persistentVolumeClaim:
                claimName: nextcloud-html
            - name: nextcloud-data
              persistentVolumeClaim:
                claimName: nextcloud-data

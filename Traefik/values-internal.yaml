ingressClass:
  enabled: true
  isDefaultClass: false
  name: traefik-internal
service:
  type: LoadBalancer
  annotations:
    metallb.universe.tf/loadBalancerIPs: "10.10.20.120"
providers:
  kubernetesCRD:
    enabled: true
    ingressClass: traefik-internal
  kubernetesIngress:
    enabled: true
    ingressClass: traefik-internal
    publishedService:
      enabled: true
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    memory: 256Mi
logs:
  general:
    level: WARN

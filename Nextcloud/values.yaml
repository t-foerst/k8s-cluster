nextcloud:
  host: cloud.foerst.haus
  image:
    registry: docker.io
    repository: nextcloud
    tag: "latest"
  existingSecret:
    enabled: true
    secretName: nextcloud-secret
    usernameKey: admin-user
    passwordKey: admin-password
    # Optional: SMTP password key in the same secret
    # smtpUsernameKey: smtp-username
    # smtpPasswordKey: smtp-password

  # PHP memory limit (increase for large file uploads)
  phpMemoryLimit: 512M

  # Trusted domains (host is added automatically)
  trustedDomains: []

  # Extra config options written to config.php
  configs:
    custom.config.php: |-
      <?php
      $CONFIG = array(
        'overwriteprotocol' => 'https',
        'default_phone_region' => 'DE',
        'loglevel' => 2,
        'maintenance_window_start' => 1,
      );

ingress:
  enabled: true
  className: traefik-external
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-dns
  tls:
    - secretName: nextcloud-tls
      hosts:
        - cloud.foerst.haus

persistence:
  enabled: true
  existingClaim: nextcloud-data

mariadb:
  enabled: false

postgresql:
  enabled: true
  image:
    registry: docker.io
    repository: bitnami/postgresql
    tag: "latest"
  global:
    postgresql:
      auth:
        username: nextcloud
        database: nextcloud
        existingSecret: nextcloud-secret
        secretKeys:
          userPasswordKey: postgresql-password
          adminPasswordKey: postgresql-admin-password
  primary:
    persistence:
      enabled: true
      storageClass: longhorn-ssd
      size: 1Gi

redis:
  enabled: false

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    memory: 2Gi

livenessProbe:
  enabled: true
  initialDelaySeconds: 60
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 6

readinessProbe:
  enabled: true
  initialDelaySeconds: 30
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 6

startupProbe:
  enabled: true
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 60

strategy:
  type: Recreate

# Nextcloud cronjob for background tasks
cronjob:
  enabled: true

ingressClass:
  enabled: true
  isDefaultClass: false
  name: traefik-external
service:
  type: LoadBalancer
  annotations:
    metallb.universe.tf/loadBalancerIPs: "10.10.20.140"
providers:
  kubernetesCRD:
    enabled: true
    ingressClass: traefik-external
  kubernetesIngress:
    enabled: true
    ingressClass: traefik-external
    publishedService:
      enabled: true
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    memory: 256Mi
logs:
  general:
    level: WARN

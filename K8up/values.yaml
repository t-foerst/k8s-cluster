operator:
  resources:
    requests:
      cpu: 20m
      memory: 128Mi
    limits:
      memory: 256Mi

  # Global Wasabi S3 backend — alle Namespaces bekommen automatisch ein
  # eigenes Restic-Repository unter s3://<bucket>/<namespace>/
  env:
    - name: BACKUP_GLOBALS3ENDPOINT
      # Wasabi-Region anpassen: s3.eu-central-2.wasabisys.com, s3.us-east-1.wasabisys.com, ...
      value: "https://s3.eu-central-2.wasabisys.com"
    - name: BACKUP_GLOBALS3BUCKET
      value: "k8s-volume-backups"
    - name: BACKUP_GLOBALREPOPASSWORD
      valueFrom:
        secretKeyRef:
          name: k8up-global-secret
          key: restic-password
    - name: BACKUP_GLOBALACCESSKEYID
      valueFrom:
        secretKeyRef:
          name: k8up-global-secret
          key: access-key-id
    - name: BACKUP_GLOBALSECRETACCESSKEY
      valueFrom:
        secretKeyRef:
          name: k8up-global-secret
          key: secret-access-key

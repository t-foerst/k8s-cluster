apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dokuwiki
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/t-foerst/k8s-cluster.git
    targetRevision: HEAD
    path: DokuWiki
  destination:
    server: https://kubernetes.default.svc
    namespace: dokuwiki
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

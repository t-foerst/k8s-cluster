apiVersion: k8up.io/v1
kind: Schedule
metadata:
  name: backup
  namespace: audiobookshelf
spec:
  backup:
    schedule: "0 2 * * *"
    keepJobs: 3
  prune:
    schedule: "0 3 * * 0"
    keepJobs: 1
    retention:
      keepLast: 7
      keepWeekly: 4
      keepMonthly: 6
  check:
    schedule: "0 4 * * 1"
    keepJobs: 1

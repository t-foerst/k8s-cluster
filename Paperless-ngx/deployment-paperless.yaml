apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperless-ngx
  namespace: paperless-ngx
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: paperless-ngx
  template:
    metadata:
      labels:
        app: paperless-ngx
    spec:
      containers:
        - name: paperless-ngx
          image: ghcr.io/paperless-ngx/paperless-ngx:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: PAPERLESS_URL
              value: "https://paperless.foerst.haus"
            - name: PAPERLESS_ALLOWED_HOSTS
              value: "paperless.foerst.haus"
            - name: PAPERLESS_CSRF_TRUSTED_ORIGINS
              value: "https://paperless.foerst.haus"
            - name: PAPERLESS_USE_X_FORWARD_HOST
              value: "true"
            - name: PAPERLESS_USE_X_FORWARD_PORT
              value: "true"
            - name: PAPERLESS_PROXY_SSL_HEADER
              value: "[\"HTTP_X_FORWARDED_PROTO\", \"https\"]"
            - name: PAPERLESS_DBENGINE
              value: "postgresql"
            - name: PAPERLESS_DBHOST
              value: "paperless-db"
            - name: PAPERLESS_DBPORT
              value: "5432"
            - name: PAPERLESS_DBNAME
              value: "paperless"
            - name: PAPERLESS_DBUSER
              value: "paperless"
            - name: PAPERLESS_DBPASS
              valueFrom:
                secretKeyRef:
                  name: paperless-secret
                  key: POSTGRES_PASSWORD
            - name: PAPERLESS_REDIS
              value: "redis://paperless-redis:6379"
            - name: PAPERLESS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: paperless-secret
                  key: PAPERLESS_SECRET_KEY 
            - name: PAPERLESS_TIME_ZONE
              value: "Europe/Berlin"
          volumeMounts:
            - name: data
              mountPath: /usr/src/paperless/data
            - name: media
              mountPath: /usr/src/paperless/media
            - name: consume
              mountPath: /usr/src/paperless/consume
          readinessProbe:
            httpGet:
              path: /
              port: http
              httpHeaders:
                - name: Host
                  value: paperless.foerst.haus
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: paperless-data
        - name: media
          persistentVolumeClaim:
            claimName: paperless-media
        - name: consume
          emptyDir: {}